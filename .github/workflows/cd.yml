name: CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: cd-jurupema-api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release

    - name: Publish
      run: dotnet publish src/Jurupema.Api/Jurupema.Api.csproj --configuration Release --output src/Jurupema.Api/publish

    # Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./src/Jurupema.Api
        push: true
        tags: |
          spudin/jurupema.api:latest
          spudin/jurupema.api:${{ github.sha }}

    # Required secret: AZURE_CREDENTIALS (service principal with Contributor on the app or resource group)
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy container to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: jurupema-api
        images: spudin/jurupema.api:${{ github.sha }}
